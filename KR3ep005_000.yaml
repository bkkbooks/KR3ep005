半夏曲瓦愣子橘葉鬱金咳嗆穢痰帶血右脈弦數由氣鬱絡傷肺金受克冬至節已近須寬懷調理陳阿膠丹參米仁麥冬肉炒蘇子藕節北沙參茜草橘紅枇杷葉淮牛膝患瘧時失於表理肺氣不宣膀痿咳血延久不痊表虛自汗並神色光白症屬肺痿不宜過用涼劑痰腥大失血生耆枇杷葉橘紅蛤粉炒阿膠藕汁米仁淮牛膝茜草川百合冬瓜子吞食噎逆痰喘動血乃肝鬱刑金肺氣痿傷也恐盛暑病劇慎之慎之陳阿膠甜杏仁麥冬冬桑葉冬瓜子茅根生米仁川貝母橘紅生蛤殼枇杷葉肺氣素虛又感溫邪身熱咳血肺絡傷也所以咯痰膠膩六脈數大正氣雖虛溫補不合生洋參一錢五分生米仁四錢川百合三錢茅柴根四錢陳阿膠二錢橘紅一錢沙參二錢枇杷葉一錢五分刷茜草一錢淮膝炭一錢五分虛勞氣虛表弱色脈少神自汗屬泄法當培本炙黃耆茯神白芍地骨皮牡蠣紅棗川石斛棗仁新會女珍子桑葉表裡交虛形衰脈弱病經三載須氣陰並補炙黃耆茯神山藥麥冬肉丹皮熟地棗仁五味女珍子紅棗食少痰多火動不寐診得六脈虛弦無力可見氣陰俱不足也健中保肺為主西黨參陳阿膠茯神淮藥麥冬肉制於術北沙參棗仁百合橘白類瘧兼嗆惡寒脈軟表裡俱虛非補無策黃耆茯神麥冬白芍桑葉首烏棗仁橘紅牡蠣紅棗失血後喘咳業經一載氣血俱虛殊非輕渺熟地北沙參茯神牡蠣橘紅丹皮陳阿膠棗仁山藥氣喘咳血惡寒自汗脈數腹痛大便不結不但營液內虧肝胃亦困敗均非佳境姑擬補土寧金法以望奏效炙綿耆淮山藥茯神菟絲蛤粉炒阿膠北沙參牡蠣湘蓮枇杷葉腎水不能制火必致剋金陰精不能化風必致病燥燥則癢癢則咳以致音啞嗌痛脈動無神此木鬱水虧虛火上炎之象鄙擬滋納以視動靜青鹽炒熟地牡蠣川貝川鬱金云茯神鹽水炒廣皮淮膝龜板川百合雞子黃沖質弱火炎牙痛口乾六脈並不弦數此係肝腎虛而不克輸津上供不宜過投涼劑西黨參阿膠茯神北沙參青鹽大熟地丹皮棗仁麥冬肉氣虧表弱不時寒熱營絡空虛氣喘火升六脈不甚有力須氣陰兼顧真西黨茯神北沙參麥冬橘白制於術杞子懷山藥阿膠青鹽連進補劑並不膈脹作痛不但營液有虧表陽亦不固甚宜用重劑頻補庶乎奏效西黨參熟地茯神麥冬牡蠣北沙參淮膝棗仁百合水梨失血兼精滑肝腎虛損筋拘而坐臥不寧六脈細軟無力屬下虛而血不養肝並泄自汗此大虛候也須重劑培補炙綿耆茯神麥冬狗脊杞子大熟地棗仁五味龍齒鬱金沖氣分不足肝絡不和以補氣養營調治勞力則食減飢則左肋痛腳麻頭痛於朮歸身川斷鉤鉤香附茯苓白芍法夏杞子丸方西黨歸身川斷茯苓法夏熟地於朮白芍菟絲木香新會炙草肺腎兩虛腰痛痰喘飲食有限宜補脾腎保肺調理炙耆於朮五味杞子沙苑烏賊骨熟地麥冬歸身杜沖湘蓮煅牡蠣研末用川石斛煎湯泛丸內傷兼少陽熱鬱鼻衄及便溏帶血陰陽絡俱傷須省力調治生地炭白芍木香米仁澤瀉炒丹皮鱉甲山藥木瓜中虛陰火不潛六脈沉弱無力元生地丹皮茯苓杞子玉竹山藥澤瀉萸肉川柏蘆根素體陰虧近兼咳逆自汗脾泄六脈虛數無力陽本大虧宜填納溫補然無虞未許炙綿耆二錢炒熟地四錢杞子二錢茯苓二錢北五味二錢沉香汁三分真西黨三錢制於術二錢白芍二錢棗仁三錢干河車一錢五分久嗽不止多痰咽痛及氣喘脈軟軟舉動無力不但陰虧中氣大虛也均非吉兆制於術二錢麥冬二錢茯神二錢甘杞子二錢人中白一錢大熟地四錢五味三分炙橘白一錢煅牡蠣三錢久嗽中虛多痰脾泄津失供肺音啞咽痛此重候也愈期未許制於術二錢北沙參二錢生米仁四錢茯苓二錢人中白一錢淮山藥二錢川百合三錢白扁豆二錢橘紅一錢冬桑葉一錢氣虛骨熱營液成痰筋骸不得舒展以致腫潰膿水艱於收口已屬虛損惟宜培本生耆一錢五分熟地四錢五味炙三分杞子二錢五加皮一錢炒棗仁三錢歸身二錢山藥二錢麥冬二錢川斷一錢五分細桑枝四錢酒炒症屬虛損莫作風濕治從脾腎培補以圖元旺病卻並有遺泄熟地淮藥歸身狗脊木瓜於朮杞子川斷杜仲羊腎膏滋方去山藥川斷羊腎加桑枝胡桃黨參虎骨龜板白蜜湘蓮粉收入中虛陰火不潛多痰內熱勞怯根苗須省力服藥制首烏三錢北沙參二錢女珍二錢橘紅一錢制香附三錢生綿耆一錢五分歸身一錢五分杜仲三錢丹皮一錢五分冬桑葉一錢遺精相火旺而兼濕熱下注以致陽舉精泄六脈弦滑以滋清佐苦泄法鮮生地蓮鬚赤苓丹皮米仁川柏龜板萆薢澤瀉甘草精關不固腰脊痿痛六脈細軟無力宜澀精溫補炒熟地淮山藥川斷北五味湘蓮肉制於術金櫻子杜仲白茯苓丸方去金櫻加黨參狗脊線魚膠砂仁厥陰氣鬱膈脹目昏君火內迫陰精屬泄脈不柔軟當用交心腎苦泄法兼心悸過度作肝火看由用心服過補藥不效川黃連黑山梔澤瀉蓮鬚柏子霜法半夏赤苓鬱金橘葉坎離不交驚恐自汗近兼精滑精氣神俱虧脈空無力須重劑頻補足痿艱行炙耆三錢五味四分炙茯神二錢煅牡蠣五錢川柏一錢貢干一兩熟地八錢麥冬三錢棗仁三錢淮山藥三錢湘蓮七粒失血兼精滑肝腎虛損筋拘而坐臥不寧六脈細軟無力屬下虛而血不養肝並泄自汗此大虛候也須重劑培補炙耆二錢北五味子四分茯神二錢金狗脊一錢五分甘杞子二錢熟地五錢麥冬肉二錢棗仁三錢煅龍齒二錢川鬱金一錢心腎不交多夢遺泄素有便血宜黑歸脾調理制於術茯神金櫻子麥冬肉澤瀉炒生地棗仁蓮鬚北五味丸方西黨參熟地茯神金櫻子麥冬龜板心制於術湘蓮棗仁五味肉牡蠣川柏蜜丸咳血復萌近兼遺泄幸不脈數氣喘想見陰分不致大虧乃陰絡傷也先理後補北沙參陳阿膠丹參蓮鬚花粉麥冬肉川百合茜草茯神丸方西黨麥冬茯神白線膠龜板北沙參熟地五味棗仁煅牡蠣湘蓮丹皮藕汁泛丸陰分不足又兼濕火上衝腦頂下陷遺泄督脈痿痛清上納下治熟地龜板蓮鬚石決明首烏川柏茯苓冬桑葉淋濁中氣不足便濁下注以四君攝精治真西黨茯神牡蠣北五味炙草淮山藥萆薢牛膝炒白芍又丸方即前方加於朮米仁湘蓮肉久濁元虛六脈無力健中升清自然安適制於術萆薢生米仁牡蠣冬瓜子赤苓澤瀉沙蒺藜山藥甘草梢脾腎兩虛腰痛便濁未免費心太過君火下陷但此患久纏命門陽氣不攝以致上脈沉弱大便溏薄擬補中益氣合滋腎法服過大黃數兩未效真西黨熟地茯神肉桂炙草制於術升麻棗仁萆薢湘蓮丸方去萆薢加五味金櫻子阿膠搗丸誤服藥酒熱注膀胱小便下濁久延不痊煩渴肉削診得六脈並不弦數茲用補中益氣加減法西黨參熟地麥冬萆薢升麻蘆根制於術茯神五味牡蠣湘蓮便濁腰痛督脈受傷以固精補氣治大熟地金櫻子川斷龍骨淨歸身芡實狗脊杜仲久濁不止腎部痿痛分清溫潤治西黨參川萆薢淡蓯蓉杜仲生歸身大熟地赤茯苓沙蒺藜牡蠣湘蓮肉尿血兼濁頻解溺痛左肋不和恐有蓄血此方暫服川連萆薢瓦楞子甘草歸鬚赤苓元胡索便濁久纏濕火下注也升清分利治元生地川萆薢炙升麻赤苓蓮鬚丹皮甘草梢生米仁澤瀉尿血膈脹尿血由厥陰氣鬱膀胱絡傷也暫用破瘀導下法川連制軍川鬱金澤瀉甘草梢赤苓歸鬚延胡索蔞皮琥珀屑接服方萆薢淡苓牛膝炭澤瀉生藕赤苓丹皮生米仁蓮鬚腹膨便溺下注尿血由肝經熱鬱膀胱絡傷也先宜疏滯然後培補奏效女川黃連當歸鬚赤芍車前枳殼制生軍牛膝炭赤苓澤瀉新絳屑接服方生於術琥珀屑赤苓澤瀉荷蒂生米仁川鬱金萆薢生草濕熱傷絡曾下尿血神色萎黃當用健中分理年六七歲飲食少溺時作痛虛治一童年六七歲尿血苦痛元旺投川連大黃生於術赤苓澤瀉牡丹皮冬瓜子生米仁萆薢川柏生甘草尿血兼濁頻解溺痛左肋不和恐有蓄血此方暫服川連萆薢瓦楞子甘草歸鬚赤苓元胡索心火內迫膀胱絡傷以致尿血生洋參元生地丹參血餘灰萆薢大麥冬牡丹皮茯神琥珀屑尿血溺痛久延不痊六脈無力須標本兼顧西黨參炒丹皮萆薢炒阿膠湖藕雲茯苓炒杞子升麻甘草梢尿血久纏腰腹作痛屢投利劑氣陷傷津以致精神委頓六脈細軟若不升清培補恐交秋病劇西黨參赤茯神升麻沙苑木香制於術甘草梢杞子萆薢藕節小便閉癃外症已愈小溲仍然不爽脈象亦未柔軟大補不宜陰囊潰爛生洋參丹皮萆薢龜板甘草梢制首烏赤苓米仁蓮鬚命門氣虧兼之中虛氣陷清氣不升小便溺塞診得六脈沉弱所以涼劑不宜多服西黨參升麻菟絲子萆薢琥珀屑制於術赤苓甘草梢澤瀉濕火下注小便溺痛六脈弦緊須用分清導下法方許奏效錦紋蓮鬚萆薢牛膝甘草梢川連歸鬚澤瀉赤苓冬瓜子頻解溺痛左脈細軟乃少陰虧而膀胱挾熱也以滋腎法熟地四錢升麻四分炙赤茯苓二錢川柏一錢生甘草四分肉桂四分萆薢一錢五分柏子霜一錢五分丹皮一錢五分琥珀屑三分研沖
