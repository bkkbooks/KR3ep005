body:
  text: 類中頭暈體豐心悸脈動類中之漸須安養調治熟地四錢茯神二錢甘菊一錢五分豨蘞草一錢五分石決明四錢老桑葉一錢五分歸身二錢棗仁三錢麥冬二錢白蒺藜四錢柏子霜一錢五分陽不交陰鼻塞不通兩膝麻而不暖乃命門火微也用潛陽溫補熟地四錢茯神二錢杞子二錢半夏一錢五分胡桃肉二錢歸身二錢棗仁三錢蓯蓉一錢五分新會皮一錢少寐頭暈陽不交陰也六脈緊數無疑肝火挾痰為患防其類中熟首烏法半夏茯神石決明橘紅羚羊角麥冬肉棗仁白蒺藜川鬱金丸方去羚羊蒺藜鬱金加於朮膽星石菖蒲淮牛膝鮮竹茹鉤鉤湯泛法丸卒然厥暈膈次脹楚六脈弦數當用佐金法川黃連歸身茯神川楝子木香竹茹淡吳萸白芍棗仁石決明橘葉陽本虧而厥陰氣鬱以致身心勞動即頭暈肢麻脈來弦滑類中之機預為調治真西黨石決明茯神草鬱金橘紅熟首烏白蒺藜棗仁淮牛膝竹茹營陰內傷血不養肝以致惡寒脈軟膈脹作痛兼之舌本不利語言不清須寬心安養可免此患紫丹參三錢法半夏一錢五分茯神二錢炒白芍一錢五分川鬱金一錢大生地四錢煨木香四分棗仁三錢淡蓯蓉一錢五分橘葉三片肺胃不清不能言語此濕痰凝於肺胃清竅不利使然擬方暫服炒白朮二錢法半夏一錢五分麥冬二錢歸身一錢五分淡乾薑七分炒毛術一錢五分新會皮一錢茯神二錢白蒺藜四錢聲音不清不能言語屬下焦氣虧惟宜溫補川桂枝法半夏茯神川貝白芥子薑汁制遠志新會仁棗仁杞子石菖蒲又丸方黨參二兩熟地三兩夏曲一兩茯神一兩五錢蓯蓉一兩橘白七錢於朮二兩菖蒲一兩五味五錢膽星五錢棗仁二兩肉桂四錢淡蜜水丸肝火挾痰卒然暈厥當此發生之候疏風清鎮治羚羊角法半夏白蒺藜黑山梔石決明熟首烏橘紅天麻淮牛膝石菖蒲中虛肝部心嘈膈脹須開懷調養否則防類中西黨參歸身茯神法半夏天麻制於術白芍棗仁煨木香橘葉接服歸脾丸手足麻木面發紅塊風症將成和營祛風兼理大熟地歸身青防風紅花厚杜仲制於術川斷鹿角霜木防己桂枝煉蜜為丸風濕襲於營衛以致手足麻木肌膚不仁以祛濕養營調治真茅朮熟首烏川斷白蒺藜秦艽川牛膝制於術炒歸身木瓜豨蘞草杞子生米仁熬鹿角膠三兩為丸上手足腫痛不仁艱於言語此風入絡脈痰蒙清竅也宜祛風豁痰治之羚羊角秦艽刺蒺藜歸身防風法半夏木瓜五加皮橘紅忍冬藤積勞內虧腰痛肢痿津液內竭並六脈沉弱少力必須溫補否則防類中黨參熟地茯神杞子北五味麥冬歸身棗仁蓯蓉胡桃肉陽微濕困腰膝無力軟中之基形戒酒謹慎制於術歸身狗脊川附子胡桃大熟地杜仲杞子五加皮肝風質弱火炎耳鳴頭暈膈次不寬先用疏肝清理然後進補奏效制首烏青蒿石決明花粉澤瀉元生地甘菊老桑葉鉤鉤生甘草耳鳴頭暈六脈弦滑不柔肝火挾痰為患先清後補制首烏黑山梔石決明池菊白蒺藜法半夏茯苓老桑葉淮牛膝卒然厥暈膈次脹楚六脈弦數當用左金法方在類中復川黃連茯神炒白芍木香川楝子竹茹淡吳萸棗仁石決明歸身真橘葉肝風挾痰防其癇厥六脈弦數暫用疏肝滌飲治四肢麻時昏沉制首烏茯神白蒺藜石決明鉤鉤法半夏鬱金香附黑山梔肝風挾痰統體麻木兼驚惕不寧屢欲嘔惡乃肝邪侮胃中氣虛也宜標本兼顧臥則不寐行則不能坐則足腫臥則腫退症屬濕痰並非腳氣於朮法半夏白蒺藜五加皮茯神十大功勞茅朮白歸身秦艽石決明棗仁肝風挾痰上焦清空竅不利也以清鎮疏肝降氣治其人壯時暈厥跌倒羚羊尖法半夏黑山梔茯神橘紅陳膽星制首烏石決明白蒺藜棗仁降香咽痛咳痰膈脹便溏此中虛厥陰化風宜調中潤肺治之桑白皮橘紅炒蘇子桔梗薄荷葉生耆鉤鉤大力子赤苓冬瓜子復診炒蘇子炒扁豆橘紅桔梗生甘草川石斛生米仁茯苓鬱金膈脹目昏舌本手指麻木當此厥陰用事之候未敢遂補鄙擬疏風滌飲法以視動靜百蒸於朮蒺藜茯神歸身石決明薑製半夏甘菊棗仁新會冬桑葉時疾後驚恐以致下部精滑上衝嘔惡觸動肝風膈脹浮腫兼右脈滑大先宜理胃疏肝然後補其偏勝薑製半夏廣藿代赭石鉤鉤竹茹赤茯神黑山梔白蒺藜橘紅肝鬱生風內熱膈脹不思飲食以通為補元米炒川連廣藿新會大麥仁炒白芍法半夏鬱金橘葉歸鬚荷蒂木鬱生風心悸口乾兼之腹鳴侮土不克輸津長肌恐成單腹莫作輕視川連法半夏炒白芍澤瀉橘葉廣藿白茯苓焦神麯黑山梔接服方土炒於朮法半夏茯神白芍黑山梔川石斛白歸身棗仁橘葉澤瀉肝失所養內風煽爍時身心煩動氣機呼吸不利以致痰喘現診脈象並不細軟並脾胃無咎未必陽本虧也茲此以甘露飲加減法其人七旬每於亥於時發痰壅氣逆血少肝亢真西黨熟地淡天冬茯神柏子霜元生地牛膝大麥冬棗仁鬱金汁丸方西黨參半夏曲茯神柏子霜石決明枇杷葉大熟地沉香末棗仁胡桃霜淮牛膝血虛肝鬱厥陰化風病經三載以柔肝培本恆服奏效熟地制首烏茯神杞子甘菊花歸身石決明棗仁牛膝老桑葉接服方炙黃耆阿膠茯神甘杞子石決明大熟地歸身棗仁柏子霜老桑葉肝火挾痰卒然暈厥當此發生之候宜疏風清鎮治羚羊角法半夏石決明白蒺藜橘紅熟首烏天麻黑山梔淮牛膝菖蒲厥陰之氣有餘不時發熱熱甚生風神昏厥逆當此升令宜用清心疏鎮法月事不至制首烏麥冬歸鬚石決明枳實半夏曲茯神黑山梔川鬱金益母膏二錢沖營液交虛心陽飛越上實下虛易飢膽怯延久不痊神思倦怠脈數無力鄙擬甘溫潛納法附方酌用炙黃耆二錢麥冬三錢茯神二錢杞子三錢新會紅一錢大熟地五錢五味四分棗仁三錢牡蠣四錢煅龍眼肉二錢肝膽熱鬱生風統體作痛陽明濕邪下注以致口渴不清左脈緊大先用疏風分理然後進補奏效羚角片歸身白蒺藜赤苓生米仁生白朮秦艽川續斷萆薢忍冬藤接服方制首烏白朮煅牡蠣沙苑細桑枝歸身川斷生米仁赤神生甘草神志不清頻發厥暈上焦空竅蒙閉也以瀉心降氣治川黃連法半夏代赭石枳實竹茹風化硝炒蘇子白茯苓牛膝菖蒲厥陰氣鬱郁久生風風甚生痰中焦清竅不利也須戒葷及酒不致神昏顛倒羚羊角石決明法半夏茯神殭蠶甘菊花明天麻葶藶子黑山梔竹茹厥陰化風痰氣壅於上焦以致右脈滑數瘭癤不消以和肝化痰法制洋參象貝秦艽石決明冬桑葉夏枯草麥冬橘紅白蒺藜黑山梔久患休息復兼咳血二端俱愈惟是內風扇動以致心悸頭暈右脈弦數宜黑歸脾通補徐徐安痊制於術煨木香茯神炒白芍炙甘草炒阿膠遠志肉棗仁炒丹皮厥陰氣鬱久而化風營陰暗耗不寐火動及上焦脈絡痿痛當此發生之候宜疏風靜養熟地歸身茯神杞子柏子仁洋參麥冬棗仁龜板十大功勞厥陰化風神不守舍屢汗火升心悸不寐以安魄苦泄治川連歸身茯神石決明黑山梔半夏麥冬棗仁白蒺藜橘葉內風煽爍肺氣不宣以致鼻竅不利面部紅腫抽動以清金化風熱邪自泄此方暫服羚羊角桑白皮石決明甘菊豨蘞草荊芥生米仁地骨皮知母生甘草接服方熟首烏歸身桑葉澤瀉生甘草麥冬肉丹皮豨蘞黑山梔陽明有餘少陰不足水不涵木肝火內動脈數肢痿宜祛風培水調治熟地歸身牛膝杞子生虎骨十大功勞首烏秦艽木瓜赤苓元武板多痰頭暈四肢麻木由脾虛挾濕血少肝風六脈滑大不柔以平肝燥土調治炒熟地於朮歸身白蒺藜橘紅法半夏茅朮白芍甘杞子平昔好飲操勞火動傷絡據曾失血肝失所養陰氣易浮立春節近當從心脾腎調治西黨遠志肉茯神米仁蛤粉炒阿膠麥冬女珍子棗仁牛膝桂圓肉水不涵木肝風內熾肺氣受克肌體不潤筋骸不利痛痹之漸培水柔肝兼治制首烏三錢秦艽一錢五分豨蘞草二錢五加皮三錢柏子霜一錢五分十大功勞二錢淨歸身二錢米仁四錢地膚子一錢五分冬桑葉一錢五分生甘草四分肺腎兩虛多痰咳逆肝風內熾痰火壅結腫連頤頸暫用滌痰清理然後進補生綿耆制首烏知母橘紅生鱉甲真川貝蛤殼桑葉厥陰氣鬱絡傷經敗肝失所養木風愈甚脈不柔軟以通為補擬用黑逍遙佐苦泄法元米炒川連五分制於術一錢五分炒黑棗仁三錢制香附三錢石決明四錢煅炒黑柴胡八分白茯神二錢炒黑丹皮一錢五分草鬱金一錢橘葉三張水虧肝風內動以致虛里穴跳動以交心腎和肝調治熟首烏三錢川石斛三錢茯神二錢黑山梔一錢五分牡蠣四錢煅大麥冬二錢炒白芍一錢五分棗仁三錢新會一錢湘蓮七粒始疾咳嗆繼之帝丁脹楚此邪入厥陰為患以培水化風治陳阿膠大力子人中白歸鬚生甘草淮牛膝馬兜鈴枇杷葉青黛新絳屑眩暈頭暈體豐心悸脈動類中之漸須安養調治熟地茯神麥冬肉甘菊白蒺藜老桑葉歸身棗仁石決明豨蘞柏子霜質弱火炎耳鳴頭暈膈次不寬先用疏肝清理然後進補元生地青蒿石決明花粉澤瀉制首烏甘菊老桑葉鉤丁甘草耳鳴頭暈六脈弦滑不柔肝火挾痰為患先清後補制首烏法半夏淮牛膝白蒺藜茯苓石決明甘菊花黑山梔冬桑葉頭暈膈脹陰虛肝絡不舒也理氣疏風兼治歸身茯神甘菊花川鬱金女珍子橘葉白芍棗仁白蒺藜制香附阿膠頭暈多痰心悸少寐坎離不交心志不寧以苦泄安神自然安適川連辰砂拌麥冬棗仁丹參橘紅法半夏云茯神龍齒橘葉竹茹頭痛頭風數載由肝腎不足兼表陽空疏稍觸外感內風輒動炙綿耆女珍子歸身石決明青鹽少許大熟地冬桑葉茯神甘菊氣虧表弱客邪易入觸動肝風頭痛嘔吐以固表養肝治炙綿耆白歸身白蒺藜甘菊黑山梔制首烏法半夏石決明白芍桑葉膈脹頭痛少陽熱鬱也防其腹滿柴胡石決明鬱金新會皮牛膝黑山梔栝蔞皮白芍澤瀉佛手表虛頭痛甚則腹泄嘔吐此肝風侮土也暫用溫膽法川連法半夏茯苓池菊黑山梔焦術石決明廣藿白芍咳嗽咳嗆脾泄飲食日減六脈軟弱少力土不生金之驗症非輕渺制於術茯神川貝母歸身川石斛北沙參山藥新會皮香附紅棗久咳膈痛右脈弦數肺痿之漸莫作輕視北沙參川貝母生耆橘白冬瓜子紫菀生蛤殼米仁雲苓桑葉喘咳稠痰轉劇咽痛脈弱此非有餘之火剋金乃氣虛肝液虧也若再投涼劑脾胃困敗須重劑滋補圖其奏效熟地川貝橘白天竺黃淮山藥於朮杞子茯苓焙麥冬建蓮肉咳嗆穢痰氣喘脈軟中虛肺絡受傷也殊非輕恙制於術川百合麥冬茯苓川貝茅根北沙參生蛤殼橘白桑葉知母早寒暮熱脈數煩渴嗆咳不減疑表虛火不潛根也仍用生津止渴稍佐降氣法服過涼劑未效乃下虛上實大熟地橘紅牛膝川貝母米仁生石膏蘇子知母北沙參蘆根咽間碎痛咳嗆唾涎六脈並不弦數乃肝陰虧而脾不輸津下布也所以大便燥結殊非輕恙制於術川貝杞子橘白枇杷葉半夏曲蛤殼蓯蓉杏仁人中白脾肺兩虛畏風咳喘暫用玉屏風法然後進補奏效女身熱乾嘔三月少痰腹痛食後脹四肢麻木中虛恐腫脹生黃耆防風蘇子旋覆花桑葉鮮佛手制於術半夏茯苓代赭石橘紅溫邪留戀咳嗆穢痰當此夏令宜救肺滌飲主治生耆皮枇杷葉橘紅知母淮牛膝阿膠生米仁桑葉川貝茅根耳後結痰潰膿已愈現在腠理空疏嗆咳自汗幸陽明氣旺不致大害鄙擬固表潤腸法否則防復潰生耆知母麥冬半夏曲甜杏仁米仁川貝蛤殼橘紅枇杷葉丸方去蛤殼加洋參石決明牛膝胖海參搗丸咳嗆音啞中虛木火爍金也生耆北沙參川百合紫菀橘紅丹皮麥冬肉川貝母牛膝桑葉咳吐白沫惡寒脈軟乃金寒不束津液以和脾保肺佐降氣治西